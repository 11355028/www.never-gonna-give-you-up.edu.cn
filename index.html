<!doctype html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隱私權錯誤</title>
    <style>
        /* 基礎樣式重置，確保全螢幕紅色背景 */
        html, body { 
            background-color: #d13936 !important; 
            margin: 0 !important; 
            padding: 0 !important; 
            overflow: hidden !important; 
            width: 100vw !important;
            height: 100vh !important;
            cursor: default;
        }
    </style>
</head>
<body>

    <script>
    (function() {
        const redColor = '#d13936';
        const targetUrl = 'https://www.youtube.com/watch?v=4ikL1uNa244';

        // 1. 建立偽裝警告層
        const warningOverlay = document.createElement('div');
        warningOverlay.style.cssText = `
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            background-color: ${redColor} !important;
            color: #ffffff !important;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            z-index: 2147483647 !important;
            padding: 40px !important;
            box-sizing: border-box !important;
            text-align: left !important;
            cursor: pointer;
        `;

        warningOverlay.innerHTML = `
            <div style="max-width: 600px; width: 100%; pointer-events: none; user-select: none;">
                <div style="font-size: 80px; margin-bottom: 10px; line-height: 1;">\u26A0</div>
                <h1 style="font-size: 32px; margin: 20px 0; font-weight: 400; line-height: 1.2;">前方網站含有惡意軟體</h1>
                <p style="font-size: 16px; line-height: 1.6; color: #f9f9f9; margin-bottom: 40px;">
                    攻擊者可能會在 <strong>www.never-gonna-give-you-up.edu.cn</strong> 上嘗試安裝危險程式，以竊取或刪除您的資訊（例如：相片、密碼、通訊內容和信用卡資料）。
                </p>
                <div style="display: flex; gap: 12px;">
                    <button style="background: transparent; border: 1px solid rgba(255,255,255,0.6); color: white; padding: 10px 22px; border-radius: 4px; font-size: 14px;">進階</button>
                    <button style="background: #ffffff; border: none; color: ${redColor}; padding: 10px 22px; border-radius: 4px; font-size: 14px; font-weight: bold;">返回安全狀態</button>
                </div>
            </div>
        `;

        // 2. 點擊事件：直接跳轉，不觸發任何攔截
        warningOverlay.onclick = function() {
            window.location.href = targetUrl;
        };

        // 3. 禁止右鍵，增加真實感
        document.addEventListener('contextmenu', e => e.preventDefault());

        // 4. 防止「上一頁」逃離
        // 這會讓使用者按瀏覽器的回退鍵時，依然停留在這個紅色畫面
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.pushState(null, null, location.href);
        };

        document.documentElement.appendChild(warningOverlay);
    })();
    </script>
</body>
</html>
