<!doctype html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全性警告</title>
    <style>
        html, body { 
            background-color: #d13936 !important; 
            margin: 0 !important; 
            padding: 0 !important; 
            overflow: hidden !important; 
            width: 100vw !important;
            height: 100vh !important;
        }

        #warning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2147483647;
            padding: 40px;
            box-sizing: border-box;
            text-align: left;
            color: #ffffff;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="warning-overlay">
        <div style="max-width: 600px; width: 100%; pointer-events: none; user-select: none;">
            <div style="font-size: 80px; margin-bottom: 10px; line-height: 1;">\u26A0</div>
            <h1 style="font-size: 32px; margin: 20px 0; font-weight: 400; line-height: 1.2;">前方網站含有惡意軟體</h1>
            <p style="font-size: 16px; line-height: 1.6; color: #f9f9f9; margin-bottom: 40px;">
                攻擊者可能會在 <strong>www.never-gonna-give-you-up.edu.cn</strong> 上嘗試安裝危險程式，以竊取或刪除您的資訊（例如：相片、密碼、通訊內容和信用卡資料）。
            </p>
            <div style="display: flex; gap: 12px;">
                <button style="background: transparent; border: 1px solid rgba(255,255,255,0.6); color: white; padding: 10px 22px; border-radius: 4px; font-size: 14px;">進階</button>
                <button style="background: #ffffff; border: none; color: #d13936; padding: 10px 22px; border-radius: 4px; font-size: 14px; font-weight: bold;">返回安全狀態</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        const targetUrl = 'https://youtu.be/klfT41uZniI?si=Xk9YeFLaRynAQpx3';

        // 1. 攔截關閉/重新整理 (beforeunload)
        // 注意：為了防止濫用，現代瀏覽器不會顯示你寫的字串，而是顯示系統預設的警告
        window.addEventListener('beforeunload', function (e) {
            e.preventDefault();
            e.returnValue = ''; // Chrome 需要設定這個才能觸發
        });

        // 2. 點擊跳轉到 Rickroll
        document.getElementById('warning-overlay').onclick = function() {
            window.location.href = targetUrl;
        };

        // 3. 禁止右鍵
        document.addEventListener('contextmenu', e => e.preventDefault());

        // 4. 歷史紀錄鎖定 (防止按上一頁逃脫)
        // 進入頁面後推入一個新的狀態，讓使用者按「上一頁」時仍留在本頁
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    })();
    </script>
</body>
</html>
